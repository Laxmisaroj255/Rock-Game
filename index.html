<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>R-P-S Game</h2>
        <div class="choices">
            <div class="choice" id="rock">
                <img src="rock.jpg.png" alt="">
                <p>Rock</p>
                </div>
                <div class="choice" id="paper">
                    <img src="paper.jpg (2).png" alt="">
                    <p>Paper</p>
                    </div>
                    <div class="choice" id="scissors">
                        <img src="scissor.jpg.png" alt="">
                        <p>Scissors</p>
                    </div>
                </div>
                <div class="score-board">
                    <div class="score">
                        <p id="users-score">0</p>
                        <p>You</p>
                    </div>
                    <div class="score">
                        <p id="comp-score">0</p>
                        <p>Comp</p>
                    </div>
        </div>
        <div class="msg-container">
            <p id="msg">Play your Game</p>
        </div>
    <script src="index.js"></script>
    
</body>
</html>
